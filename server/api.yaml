openapi: 3.0.2
info:
  title: Domi API
  version: 1.0.0
paths:
  /moodboard:
    post:
      summary: Generate a room moodboard from user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vibe, room_type]
              properties:
                vibe:
                  type: string
                room_type:
                  type: string
      responses:
        "200":
          description: Image URLs for the generated board
  /furniture/import:
    post:
      summary: Extract furniture metadata from a public product URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
      responses:
        "200":
          description: Extracted product metadata
        "400":
          description: Invalid or private URL
